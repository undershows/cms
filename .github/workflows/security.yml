name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # segunda 06h UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # O Strapi puxa muitas transitivas sem fix upstream, então a build só quebra
      # em vulnerabilidade CRITICAL. O restante fica registrado no log.
      - name: yarn audit (falha só em critical)
        run: |
          yarn audit --groups dependencies || code=$?
          code=${code:-0}
          if [ $((code & 16)) -ne 0 ]; then
            echo "::error::Vulnerabilidade CRITICAL encontrada nas dependências."
            exit 1
          fi
          echo "Sem CRITICAL (bitmask do yarn audit = $code)."

  trivy:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # Relatório completo (HIGH+CRITICAL) na aba Security, sem quebrar a build.
      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      # Gate: quebra a build só em CRITICAL que tenha correção disponível.
      - name: Trivy gate (falha em CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,misconfig
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: '1'
          format: table
