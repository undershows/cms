name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # segunda 06h UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # A gitleaks-action exige licença paga para orgs; o binário (via container) é livre.
      - name: Secret scan (gitleaks)
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest dir /repo --redact -v

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Report-only: o Strapi puxa dezenas de transitivas vulneráveis sem fix aplicável
      # por nós, então a build não quebra por dependência. As descobertas ficam no log
      # (e, via Trivy, na aba Security). Quem gera o gate é CodeQL/secret/misconfig.
      - name: yarn audit (report-only)
        run: yarn audit --groups dependencies || true

  trivy:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # Relatório completo (HIGH+CRITICAL) na aba Security, sem quebrar a build.
      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      # Gate: quebra a build em misconfig HIGH/CRITICAL do Dockerfile/IaC (acionável),
      # sem barrar em CVE de dependência transitiva que não conseguimos corrigir.
      - name: Trivy gate (misconfig)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table
