name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # segunda 06h UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # O Strapi puxa muitas transitivas sem fix upstream, então a build só quebra
      # em vulnerabilidade CRITICAL. O restante fica registrado no log.
      - name: yarn audit (falha só em critical)
        run: |
          yarn audit --groups dependencies || code=$?
          code=${code:-0}
          if [ $((code & 16)) -ne 0 ]; then
            echo "::error::Vulnerabilidade CRITICAL encontrada nas dependências."
            exit 1
          fi
          echo "Sem CRITICAL (bitmask do yarn audit = $code)."
